server.port=8084

# Database
spring.datasource.url=jdbc:mariadb://localhost:3307/cbild_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${CBILD_DB_USER:root}
spring.datasource.password=${CBILD_DB_PASS:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Fineract
# Victor confirmed: mifos-bank-1 is the active Fineract instance
mifos.fineract.api.base-url=${FINERACT_BASE_URL:https://mifos-bank-1.mifos.community/fineract-provider/api/v1}
mifos.fineract.api.username=mifos
mifos.fineract.api.password=${FINERACT_PASSWORD:password}

# CDC
mifos.cdc.api.base-url=https://services.circulodecredito.com.mx/sandbox/v1
mifos.cdc.mock.enabled=true

# Security — NEVER hardcode this value
# PRODUCTION CRITICAL: set CB_ENC_KEY env var before Phase 2
# Default key is in source control — acceptable Phase 1 only (EncryptionService not wired)
# Phase 2: CDC credentials encrypted with this key — MUST override in production
mifos.security.encryption.key=${CB_ENC_KEY:dev-test-key-32-bytes-long-aes!!}

# Plugin
plugin.base-url=http://localhost:8081
cbild.plugin.credit-bureau-id=13
cbild.plugin.username=tester
cbild.plugin.password=${CBILD_PLUGIN_PASSWORD:tempPassword123}
mifos.fineract.api.tenant-id=default

# Disable Redis auto-configuration until Phase 2 credential caching
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# KYC scoring weights
mifos.kyc.scoring.national-id=30
mifos.kyc.scoring.dob=20
mifos.kyc.scoring.first-name=15
mifos.kyc.scoring.last-name=15
mifos.kyc.scoring.address=15
mifos.kyc.scoring.phone=5
mifos.kyc.scoring.threshold=70

# Submission retry scheduler (MX-274)
cbild.schedule.maxAttempts=3
cbild.schedule.retryIntervalMinutes=60
cbild.schedule.pageSize=100
