# H2 in-memory database for CI — no Docker needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# create-drop allows Liquibase to build schema fresh each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Fineract — WireMock port in tests
mifos.fineract.api.base-url=http://localhost:8099
mifos.fineract.api.username=mifos
mifos.fineract.api.password=password
mifos.fineract.api.tenant-id=default

# Plugin — WireMock port in tests
plugin.base-url=http://localhost:8099

# CDC mock
mifos.cdc.api.base-url=http://localhost:8099
mifos.cdc.mock.enabled=true

# Security
mifos.security.encryption.key=test-key-32-bytes-long-for-aes!!

# Disable Redis auto-configuration in tests — no Redis in CI
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# KYC scoring weights
mifos.kyc.scoring.national-id=30
mifos.kyc.scoring.dob=20
mifos.kyc.scoring.first-name=15
mifos.kyc.scoring.last-name=15
mifos.kyc.scoring.address=15
mifos.kyc.scoring.phone=5
mifos.kyc.scoring.threshold=70
